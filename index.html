<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Number Duel</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding-top:40px}
button{padding:10px 15px;margin:5px;font-size:16px}
input{padding:10px;font-size:16px}
</style>
</head>
<body>

<h2>Number Duel</h2>

<div id="menu">
<button onclick="createRoom()">Create Room</button>
<br><br>
<input id="roomCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>
</div>

<div id="game" style="display:none">

<div>Room: <span id="room"></span></div>

<div id="setup">
<p>Choose your secret number (0‑99)</p>
<input id="secret">
<button onclick="sendNumber()">Confirm</button>
</div>

<div id="play" style="display:none">

<div id="turn"></div>

<input id="guess" placeholder="Guess number">
<button onclick="guess()">Guess</button>

<div id="result"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
